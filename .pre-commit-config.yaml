##
## Pre-commit hooks for Terraform: format, lint, and static security scanning.
##
## Setup (once):
##   pip install pre-commit        # or: brew install pre-commit
##   pre-commit install            # wires the git hook
##   tflint --init                 # installs the AWS ruleset plugin
##
## Run against everything on demand:
##   pre-commit run --all-files
##
## Hooks run on every commit that touches *.tf files. terraform_validate is
## intentionally omitted from the default set because it needs `terraform init`
## (provider download) per directory; CI runs it instead.
##
## The Terraform hooks are scoped to the deployable example and skip the
## illustrative user_claude_science_ssm.tf copies bundled inside skills/ (those
## are reference snippets — no providers/variables of their own, suppressions
## elided for readability — and would fail validate/scan by design).
##
repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
        exclude: ^skills/.*/assets/.*\.tf$
      - id: terraform_tflint
        exclude: ^skills/.*/assets/.*\.tf$
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
      - id: terraform_trivy
        exclude: ^skills/.*/assets/.*\.tf$
        args:
          - --args=--severity=MEDIUM,HIGH,CRITICAL
      - id: terraform_checkov
        exclude: ^skills/.*/assets/.*\.tf$
        args:
          - --args=--quiet
          - --args=--compact

  # Belt-and-braces secret scanning so credentials never land in this public repo.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
